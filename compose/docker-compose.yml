# DevOps Observability POC — workload + observability stack.
#
# Default `docker compose up -d` starts the 7-service Ballerina mesh, load-gen,
# and the supporting infra (Postgres, Redis, NATS) + the OTel Collector. No SaaS
# creds required — the Collector exports to `debug` (see otel-collector/config.yaml).
#
# Optional profiles:
#   --profile dev    adds Jaeger (local trace UI on :16686)
#   --profile saas   adds the Datadog Agent (needs DD_API_KEY in .env)
#
# Service name <x>-service comes from OTEL_SERVICE_NAME; the package is <x>_service.

name: devops-poc

networks:
  devops-poc:
    driver: bridge

volumes:
  pgdata:

# ── reusable env fragments ──────────────────────────────────────────────────
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=devops-poc,deployment.environment=demo,git.commit=${GIT_COMMIT:-unknown}"
  CHAOS_TOKEN: ${CHAOS_TOKEN:-dev-chaos-token}

x-db-env: &db-env
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USER: poc
  DB_PASSWORD: ${POSTGRES_PASSWORD:-pocpass}

x-ballerina-build: &ballerina-build
  args:
    GIT_COMMIT: ${GIT_COMMIT:-unknown}

services:
  # ── Observability + infra ──────────────────────────────────────────────────

  # Receives OTLP telemetry from all mesh services and fans out to Splunk (HEC)
  # and Datadog. The default config exports to stdout (debug exporter) — swap in
  # the real exporters in otel-collector/config.yaml when SaaS creds are ready.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks: [devops-poc]
    restart: unless-stopped

  # Shared relational store for five mesh services (store, customer, order,
  # inventory, invoice). Persisted via a named volume; initialized with
  # postgres/init.sql on first boot.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: poc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pocpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"   # exposed for poking around
    networks: [devops-poc]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poc"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # In-memory cache for inventory-service hot-path stock lookups. Port is
  # published so `bal test` on the host can reach it directly.
  redis:
    image: redis:7-alpine
    networks: [devops-poc]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Message bus for the async order → notification flow. JetStream is enabled
  # for durable consumer support; the monitoring port is useful for diagnosing
  # message backlogs. Port 4222 is published so `bal test` on the host can reach it.
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]   # JetStream + monitoring endpoint
    networks: [devops-poc]
    ports:
      - "4222:4222"   # client port
      - "8222:8222"   # monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # All-in-one local trace UI (--profile dev only). Receives OTLP from the
  # Collector and serves the Jaeger UI on :16686. Not needed in production paths.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    profiles: [dev]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    networks: [devops-poc]
    restart: unless-stopped

  # Datadog Agent sidecar (--profile saas only). Forwards APM traces and
  # DogStatsD metrics to Datadog Cloud; requires DD_API_KEY in compose/.env.
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    profiles: [saas]
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [devops-poc]
    restart: unless-stopped

  # ── Mesh: 7 services + load-gen ─────────────────────────────────────────────

  # Storefront / product catalog service. Handles browse and search; calls
  # inventory for stock checks. Chaos levers: latency, 500.
  store:
    build: { context: ../generate/store, <<: *ballerina-build }
    image: devops-poc/store-service
    environment:
      <<: [*otel-env, *db-env]
      OTEL_SERVICE_NAME: store-service
      DB_NAME: storedb
      INVENTORY_URL: http://inventory:9090
    ports: ["9091:9090", "9191:9099"]
    depends_on:
      otel-collector: { condition: service_started }
      postgres: { condition: service_healthy }
      inventory: { condition: service_started }
    networks: [devops-poc]
    restart: unless-stopped

  # Customer profile service. Handles account lookup and registration; backed
  # by Postgres. Chaos levers: latency, 500.
  customer:
    build: { context: ../generate/customer, <<: *ballerina-build }
    image: devops-poc/customer-service
    environment:
      <<: [*otel-env, *db-env]
      OTEL_SERVICE_NAME: customer-service
      DB_NAME: customerdb
    ports: ["9092:9090", "9192:9099"]
    depends_on:
      otel-collector: { condition: service_started }
      postgres: { condition: service_healthy }
    networks: [devops-poc]
    restart: unless-stopped

  # Front-door order orchestrator. Validates with customer, reserves inventory,
  # charges via payment, issues invoice, and publishes a NATS notification.
  # Chaos levers: DB slow query, 500.
  order:
    build: { context: ../generate/order, <<: *ballerina-build }
    image: devops-poc/order-service
    environment:
      <<: [*otel-env, *db-env]
      OTEL_SERVICE_NAME: order-service
      DB_NAME: orderdb
      CUSTOMER_URL: http://customer:9090
      INVENTORY_URL: http://inventory:9090
      PAYMENT_URL: http://payment:9090
      INVOICE_URL: http://invoice:9090
      NATS_URL: nats://nats:4222
    ports: ["9093:9090", "9193:9099"]
    depends_on:
      otel-collector: { condition: service_started }
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
      customer: { condition: service_started }
      inventory: { condition: service_started }
      payment: { condition: service_started }
      invoice: { condition: service_started }
    networks: [devops-poc]
    restart: unless-stopped

  # Stock reservation service with Redis-backed hot cache; cache misses fall
  # through to Postgres. Chaos levers: cache eviction latency spike.
  inventory:
    build: { context: ../generate/inventory, <<: *ballerina-build }
    image: devops-poc/inventory-service
    environment:
      <<: [*otel-env, *db-env]
      OTEL_SERVICE_NAME: inventory-service
      DB_NAME: inventorydb
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports: ["9094:9090", "9194:9099"]
    depends_on:
      otel-collector: { condition: service_started }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [devops-poc]
    restart: unless-stopped

  # Billing record generator. Creates invoice documents per order; backed by
  # Postgres. Chaos levers: latency, 500.
  invoice:
    build: { context: ../generate/invoice, <<: *ballerina-build }
    image: devops-poc/invoice-service
    environment:
      <<: [*otel-env, *db-env]
      OTEL_SERVICE_NAME: invoice-service
      DB_NAME: invoicedb
    ports: ["9095:9090", "9195:9099"]
    depends_on:
      otel-collector: { condition: service_started }
      postgres: { condition: service_healthy }
    networks: [devops-poc]
    restart: unless-stopped

  # Mock payment processor — the headline demo chaos target. Chaos levers:
  # timeout and sporadic 502, which cascade through order and trigger the agent.
  payment:
    build: { context: ../generate/payment, <<: *ballerina-build }
    image: devops-poc/payment-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: payment-service
    ports: ["9096:9090", "9196:9099"]
    depends_on:
      otel-collector: { condition: service_started }
    networks: [devops-poc]
    restart: unless-stopped

  # Async order-confirmation sender. Subscribes to NATS; slow-consumer backlog
  # can be injected to demonstrate downstream impact. Chaos levers: backlog.
  notification:
    build: { context: ../generate/notification, <<: *ballerina-build }
    image: devops-poc/notification-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: notification-service
      NATS_URL: nats://nats:4222
    ports: ["9097:9090", "9197:9099"]
    depends_on:
      otel-collector: { condition: service_started }
      nats: { condition: service_healthy }
    networks: [devops-poc]
    restart: unless-stopped

  # Continuous traffic generator driving realistic retail workloads across all
  # front-door services. Controlled by LOADGEN_PATTERN (baseline, spike, etc.).
  load-gen:
    build: { context: ../generate/load-gen, <<: *ballerina-build }
    image: devops-poc/load-gen
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: load-gen
      LOADGEN_PATTERN: ${LOADGEN_PATTERN:-baseline}
      STORE_URL: http://store:9090
      CUSTOMER_URL: http://customer:9090
      ORDER_URL: http://order:9090
      INVENTORY_URL: http://inventory:9090
      INVOICE_URL: http://invoice:9090
    depends_on:
      store: { condition: service_started }
      customer: { condition: service_started }
      order: { condition: service_started }
      inventory: { condition: service_started }
      invoice: { condition: service_started }
    networks: [devops-poc]
    restart: unless-stopped

  # ── MCP layer ─────────────────────────────────────────────────────────────

  # Lightweight MCP proxy — the single MCP entry point for the agent. Exposes
  # topology, cross-system correlation, and runbook tools locally, and proxies
  # Splunk and Datadog tool calls to the respective MCP backends. Swap
  # SPLUNK_MCP_URL / DATADOG_MCP_URL to point at real SaaS MCPs when creds arrive.
  mcp-proxy:
    build:
      context: ../generate/mcp-server
      <<: *ballerina-build
    image: devops-poc/mcp-proxy:latest
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: mcp-proxy
      DD_SITE: ${DD_SITE:-datadoghq.com}
      SPLUNK_URL: ${SPLUNK_URL:-https://your-splunk.splunkcloud.com}
      # Downstream MCP backends — swapped to real SaaS endpoints when creds arrive.
      SPLUNK_MCP_URL: ${SPLUNK_MCP_URL:-http://splunk-mock-mcp:8400}
      DATADOG_MCP_URL: ${DATADOG_MCP_URL:-http://datadog-mock-mcp:8401}
    ports:
      - "8290:8290"
    networks: [devops-poc]
    restart: unless-stopped
    depends_on:
      - splunk-mock-mcp
      - datadog-mock-mcp
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8290/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Mock Splunk MCP server. Implements the same MCP tool surface as the official
  # Splunk MCP (Splunkbase app 7931) with deterministic fixture responses.
  # Replace by setting SPLUNK_MCP_URL on mcp-proxy to the real Splunk Cloud endpoint.
  splunk-mock-mcp:
    build:
      context: ../generate/splunk-mock-mcp
      <<: *ballerina-build
    image: devops-poc/splunk-mock-mcp:latest
    ports:
      - "8400:8400"
    networks: [devops-poc]
    restart: unless-stopped

  # Mock Datadog MCP server. Mirrors the Datadog MCP tool surface
  # (mcp.datadoghq.com) with canned APM/metrics/monitor responses.
  # Replace by setting DATADOG_MCP_URL on mcp-proxy to the real Datadog endpoint.
  datadog-mock-mcp:
    build:
      context: ../generate/datadog-mock-mcp
      <<: *ballerina-build
    image: devops-poc/datadog-mock-mcp:latest
    ports:
      - "8401:8401"
    networks: [devops-poc]
    restart: unless-stopped

  # ── DevOps agent (Phase 4) ────────────────────────────────────────────────

  # Ballerina LLM agent and incident responder. Triggered via POST /chat
  # (AMP protocol) or POST /investigate (structured alert). Runs a 10-step
  # triage loop, calls mcp-proxy for all MCP tools, and proposes runbooks
  # before executing them. LLM backend is configurable via LLM_PROVIDER.
  devops-oversight-agent:
    build:
      context: ../
      dockerfile: generate/agent/Dockerfile
      <<: *ballerina-build
    image: devops-poc/devops-oversight-agent:latest
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: devops-oversight-agent
      # LLM backend — set LLM_PROVIDER in .env to switch (default: ollama, creds-free).
      # ollama:     OLLAMA_BASE_URL + OLLAMA_MODEL
      # anthropic:  ANTHROPIC_API_KEY + AGENT_MODEL  (AMP injects ANTHROPIC_URL automatically)
      # openai:     OPENAI_API_KEY; optionally OPENAI_BASE_URL + OPENAI_MODEL
      # amp:        AMP injects LLM_BASE_URL; optionally LLM_API_KEY + LLM_MODEL
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      # Single MCP entry point — the proxy aggregates all three tool namespaces.
      # TODO: once mcp-proxy implements full proxying, remove the two direct URLs below.
      BALLERINA_TOPOLOGY_MCP_URL: ${BALLERINA_TOPOLOGY_MCP_URL:-http://mcp-proxy:8290}
      SPLUNK_MCP_URL: ${SPLUNK_MCP_URL:-http://splunk-mock-mcp:8400}
      DATADOG_MCP_URL: ${DATADOG_MCP_URL:-http://datadog-mock-mcp:8401}
    ports:
      - "8092:8000"  # listener on 8000. host 8082/8080 are taken by Colima's AMP-VM port-forward, so use 8092
    networks: [devops-poc]
    restart: unless-stopped
    depends_on:
      - mcp-proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
