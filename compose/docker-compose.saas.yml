# Compose override — SaaS fan-out (Phase 5 demo).
#
# Swaps the OTel Collector config to config.saas.yaml (real Datadog + Splunk exporters).
# Requires DD_API_KEY, DD_SITE, SPLUNK_HEC_TOKEN, SPLUNK_HEC_URL, SPLUNK_INDEX in .env.
#
# Usage:
#   docker compose -f compose/docker-compose.yml -f compose/docker-compose.saas.yml --profile saas up -d

name: devops-poc

services:
  otel-collector:
    volumes:
      - ./otel-collector/config.saas.yaml:/etc/otel/config.yaml:ro
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN}
      SPLUNK_HEC_URL: ${SPLUNK_HEC_URL}
      SPLUNK_INDEX: ${SPLUNK_INDEX:-main}
