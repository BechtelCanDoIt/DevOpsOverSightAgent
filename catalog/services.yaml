# Service catalog — human-readable reference. The Ballerina MCP server (generate/mcp-server/catalog.bal)
# encodes this statically. Production: auto-generate from a real CMDB.

services:
  store-service:
    owner: store-team
    slack_channel: "#store"
    repo_url: https://github.com/devopspoc/store-service
    health_endpoint: "http://store:9090/health"
    sla: "99.9%"
    dependencies: [inventory-service]
    runbook_ids: [restart-service, disable-chaos]
    infra: [postgres]

  customer-service:
    owner: customer-team
    slack_channel: "#customer"
    repo_url: https://github.com/devopspoc/customer-service
    health_endpoint: "http://customer:9090/health"
    sla: "99.95%"
    dependencies: []
    runbook_ids: [restart-service, disable-chaos]
    infra: [postgres]

  order-service:
    owner: order-team
    slack_channel: "#order"
    repo_url: https://github.com/devopspoc/order-service
    health_endpoint: "http://order:9090/health"
    sla: "99.9%"
    dependencies: [customer-service, inventory-service, payment-service, invoice-service, notification-service]
    runbook_ids: [restart-service, disable-chaos, freeze-deploys]
    infra: [postgres, nats]

  inventory-service:
    owner: inventory-team
    slack_channel: "#inventory"
    repo_url: https://github.com/devopspoc/inventory-service
    health_endpoint: "http://inventory:9090/health"
    sla: "99.9%"
    dependencies: []
    runbook_ids: [restart-service, disable-chaos, clear-cache]
    infra: [redis, postgres]

  invoice-service:
    owner: finance-team
    slack_channel: "#finance"
    repo_url: https://github.com/devopspoc/invoice-service
    health_endpoint: "http://invoice:9090/health"
    sla: "99.5%"
    dependencies: []
    runbook_ids: [restart-service, disable-chaos]
    infra: [postgres]

  payment-service:
    owner: payments-team
    slack_channel: "#payments"
    repo_url: https://github.com/devopspoc/payment-service
    health_endpoint: "http://payment:9090/health"
    sla: "99.99%"
    dependencies: []
    runbook_ids: [restart-service, disable-chaos]
    infra: []

  notification-service:
    owner: platform-team
    slack_channel: "#platform"
    repo_url: https://github.com/devopspoc/notification-service
    health_endpoint: "http://notification:9090/health"
    sla: "99.5%"
    dependencies: []
    runbook_ids: [restart-service, disable-chaos]
    infra: [nats]

async_edges:
  order-service: [notification-service]   # via NATS subject orders.created

topology: |
  load-gen -> store, customer, order, invoice, inventory
  order -> customer (validate), inventory (reserve), payment (charge), invoice (bill)
  order --NATS--> notification (confirm)
  store -> inventory
  {order,customer,invoice,store,inventory} -> postgres
  inventory -> redis (cache-aside)
