# DevOps Observability POC — workload + observability stack.
#
# Default `docker compose up -d` starts the 7-service Ballerina mesh, load-gen,
# and the supporting infra (Postgres, Redis, NATS) + the OTel Collector. No SaaS
# creds required — the Collector exports to `debug` (see otel-collector/config.yaml).
#
# Optional profiles:
#   --profile dev    adds Jaeger (local trace UI on :16686)
#   --profile saas   adds the Datadog Agent (needs DD_API_KEY in .env)
#
# Service name <x>-service comes from OTEL_SERVICE_NAME; the package is <x>_service.

name: devops-poc

networks:
  devops-poc:
    driver: bridge

volumes:
  pgdata:

# ── reusable env fragments ──────────────────────────────────────────────────
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=devops-poc,deployment.environment=demo,git.commit=${GIT_COMMIT:-unknown}"
  CHAOS_TOKEN: ${CHAOS_TOKEN:-dev-chaos-token}

x-db-env: &db-env
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USER: poc
  DB_PASSWORD: ${POSTGRES_PASSWORD:-pocpass}

x-ballerina-build: &ballerina-build
  args:
    GIT_COMMIT: ${GIT_COMMIT:-unknown}

services:
  # ── Observability + infra ──────────────────────────────────────────────────

  # Receives OTLP telemetry from all mesh services and fans out to Splunk (HEC)
  # and Datadog. The default config exports to stdout (debug exporter) — swap in
  # the real exporters in otel-collector/config.yaml when SaaS creds are ready.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks: [devops-poc]
    restart: unless-stopped

  # Shared relational store for five mesh services (store, customer, order,
  # inventory, invoice). Persisted via a named volume; initialized with
  # postgres/init.sql on first boot.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: poc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pocpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"   # exposed for poking around
    networks: [devops-poc]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poc"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # In-memory cache for inventory-service hot-path stock lookups. Port is
  # published so `bal test` on the host can reach it directly.
  redis:
    image: redis:7-alpine
    networks: [devops-poc]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Message bus for the async order → notification flow. JetStream is enabled
  # for durable consumer support; the monitoring port is useful for diagnosing
  # message backlogs. Port 4222 is published so `bal test` on the host can reach it.
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]   # JetStream + monitoring endpoint
    networks: [devops-poc]
    ports:
      - "4222:4222"   # client port
      - "8222:8222"   # monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # All-in-one local trace UI (--profile dev only). Receives OTLP from the
  # Collector and serves the Jaeger UI on :16686. Not needed in production paths.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    profiles: [dev]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    networks: [devops-poc]
    restart: unless-stopped

  # Datadog Agent sidecar (--profile saas only). Forwards APM traces and
  # DogStatsD metrics to Datadog Cloud; requires DD_API_KEY in compose/.env.
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    profiles: [saas]
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [devops-poc]
    restart: unless-stopped

  # ── Mesh: 7 services + load-gen ─────────────────────────────────────────────

  # Storefront / product catalog service. Handles browse and search; calls
  # inventory for stock checks. Chaos levers: latency, 500.
  store:
    build: { context: ../code/generate/store, <<: *ballerina-build }
    image: devops-poc/store-service
    environment:
      <<: [*otel-env, *db-env]
      OTEL_SERVICE_NAME: store-service
      DB_NAME: storedb
      INVENTORY_URL: http://inventory:9090
    ports: ["9091:9090", "9191:9099"]
    depends_on:
      otel-collector: { condition: service_started }
      postgres: { condition: service_healthy }
      inventory: { condition: service_started }
    networks: [devops-poc]
    restart: unless-stopped

  # Customer profile service. Handles account lookup and registration; backed
  # by Postgres. Chaos levers: latency, 500.
  customer:
    build: { context: ../code/generate/customer, <<: *ballerina-build }
    image: devops-poc/customer-service
    environment:
      <<: [*otel-env, *db-env]
      OTEL_SERVICE_NAME: customer-service
      DB_NAME: customerdb
    ports: ["9092:9090", "9192:9099"]
    depends_on:
      otel-collector: { condition: service_started }
      postgres: { condition: service_healthy }
    networks: [devops-poc]
    restart: unless-stopped

  # Front-door order orchestrator. Validates with customer, reserves inventory,
  # charges via payment, issues invoice, and publishes a NATS notification.
  # Chaos levers: DB slow query, 500.
  order:
    build: { context: ../code/generate/order, <<: *ballerina-build }
    image: devops-poc/order-service
    environment:
      <<: [*otel-env, *db-env]
      OTEL_SERVICE_NAME: order-service
      DB_NAME: orderdb
      CUSTOMER_URL: http://customer:9090
      INVENTORY_URL: http://inventory:9090
      PAYMENT_URL: http://payment:9090
      INVOICE_URL: http://invoice:9090
      NATS_URL: nats://nats:4222
    ports: ["9093:9090", "9193:9099"]
    depends_on:
      otel-collector: { condition: service_started }
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
      customer: { condition: service_started }
      inventory: { condition: service_started }
      payment: { condition: service_started }
      invoice: { condition: service_started }
    networks: [devops-poc]
    restart: unless-stopped

  # Stock reservation service with Redis-backed hot cache; cache misses fall
  # through to Postgres. Chaos levers: cache eviction latency spike.
  inventory:
    build: { context: ../code/generate/inventory, <<: *ballerina-build }
    image: devops-poc/inventory-service
    environment:
      <<: [*otel-env, *db-env]
      OTEL_SERVICE_NAME: inventory-service
      DB_NAME: inventorydb
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports: ["9094:9090", "9194:9099"]
    depends_on:
      otel-collector: { condition: service_started }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [devops-poc]
    restart: unless-stopped

  # Billing record generator. Creates invoice documents per order; backed by
  # Postgres. Chaos levers: latency, 500.
  invoice:
    build: { context: ../code/generate/invoice, <<: *ballerina-build }
    image: devops-poc/invoice-service
    environment:
      <<: [*otel-env, *db-env]
      OTEL_SERVICE_NAME: invoice-service
      DB_NAME: invoicedb
    ports: ["9095:9090", "9195:9099"]
    depends_on:
      otel-collector: { condition: service_started }
      postgres: { condition: service_healthy }
    networks: [devops-poc]
    restart: unless-stopped

  # Mock payment processor — the headline demo chaos target. Chaos levers:
  # timeout and sporadic 502, which cascade through order and trigger the agent.
  payment:
    build: { context: ../code/generate/payment, <<: *ballerina-build }
    image: devops-poc/payment-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: payment-service
    ports: ["9096:9090", "9196:9099"]
    depends_on:
      otel-collector: { condition: service_started }
    networks: [devops-poc]
    restart: unless-stopped

  # Async order-confirmation sender. Subscribes to NATS; slow-consumer backlog
  # can be injected to demonstrate downstream impact. Chaos levers: backlog.
  notification:
    build: { context: ../code/generate/notification, <<: *ballerina-build }
    image: devops-poc/notification-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: notification-service
      NATS_URL: nats://nats:4222
    ports: ["9097:9090", "9197:9099"]
    depends_on:
      otel-collector: { condition: service_started }
      nats: { condition: service_healthy }
    networks: [devops-poc]
    restart: unless-stopped

  # Continuous traffic generator driving realistic retail workloads across all
  # front-door services. Controlled by LOADGEN_PATTERN (baseline, spike, etc.).
  load-gen:
    build: { context: ../code/generate/load-gen, <<: *ballerina-build }
    image: devops-poc/load-gen
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: load-gen
      LOADGEN_PATTERN: ${LOADGEN_PATTERN:-baseline}
      STORE_URL: http://store:9090
      CUSTOMER_URL: http://customer:9090
      ORDER_URL: http://order:9090
      INVENTORY_URL: http://inventory:9090
      INVOICE_URL: http://invoice:9090
    depends_on:
      store: { condition: service_started }
      customer: { condition: service_started }
      order: { condition: service_started }
      inventory: { condition: service_started }
      invoice: { condition: service_started }
    networks: [devops-poc]
    restart: unless-stopped

  # ── MCP layer ─────────────────────────────────────────────────────────────

  # Lightweight MCP proxy — the single MCP entry point for the agent. Exposes
  # topology, cross-system correlation, and runbook tools locally, and proxies
  # Splunk and Datadog tool calls to the respective MCP backends. Swap
  # SPLUNK_MCP_URL / DATADOG_MCP_URL to point at real SaaS MCPs when creds arrive.
  mcp-proxy:
    build:
      context: ../code/mcp/mcp-proxy
      <<: *ballerina-build
    image: devops-poc/mcp-proxy:latest
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: mcp-proxy
      DD_SITE: ${DD_SITE:-datadoghq.com}
      SPLUNK_URL: ${SPLUNK_URL:-https://your-splunk.splunkcloud.com}
      # Downstream MCP backends — swapped to real SaaS endpoints when creds arrive.
      SPLUNK_MCP_URL: ${SPLUNK_MCP_URL:-http://splunk-mock-mcp:8400}
      DATADOG_MCP_URL: ${DATADOG_MCP_URL:-http://datadog-mock-mcp:8401}
      # Include toggles (Y|N) — hard on/off gate for whole backend groups,
      # above the per-backend URL check. INCLUDE_WSO2_MCP=N drops apim/mi/is
      # from federation entirely (never connected/discovered/routed);
      # INCLUDE_K8S_MCP=Y adds k8s/docker (also needs --profile infra-mcp for
      # the k8s-mcp container + a kubeconfig). splunk/datadog are never gated.
      INCLUDE_WSO2_MCP: ${INCLUDE_WSO2_MCP:-Y}
      INCLUDE_K8S_MCP: ${INCLUDE_K8S_MCP:-N}
      # WSO2-product MCP backend URLs (used only when INCLUDE_WSO2_MCP=Y).
      APIM_MCP_URL: ${APIM_MCP_URL:-http://apim-mcp:8402}
      MI_MCP_URL: ${MI_MCP_URL:-http://mi-mcp:8403}
      IS_MCP_URL: ${IS_MCP_URL:-http://is-mcp:8404}
      K8S_MCP_URL: ${K8S_MCP_URL:-}
      DOCKER_MCP_URL: ${DOCKER_MCP_URL:-}
      # Optional bearer auth on the proxy's /mcp endpoint (Refactor R4.3).
      # Empty (default) = unauthenticated, matching the creds-free demo.
      PROXY_API_KEY: ${PROXY_API_KEY:-}
      # restart-service/scale-service (Phase 7.1/7.2) real write paths — both
      # default OFF; every write falls back to the pre-existing stub unless
      # a real backend is connected AND this is explicitly enabled.
      K8S_WRITE_ENABLED: ${K8S_WRITE_ENABLED:-false}
      RESTART_CONTAINER_PREFIX: ${RESTART_CONTAINER_PREFIX:-devops-poc-}
    ports:
      - "8290:8290"
    networks: [devops-poc]
    restart: unless-stopped
    depends_on:
      - splunk-mock-mcp
      - datadog-mock-mcp
      - apim-mcp
      - mi-mcp
      - is-mcp
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8290/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Mock Splunk MCP server. Implements the same MCP tool surface as the official
  # Splunk MCP (Splunkbase app 7931) with deterministic fixture responses.
  # Replace by setting SPLUNK_MCP_URL on mcp-proxy to the real Splunk Cloud endpoint.
  splunk-mock-mcp:
    build:
      context: ../code/mcp/splunk-mock-mcp
      <<: *ballerina-build
    image: devops-poc/splunk-mock-mcp:latest
    ports:
      - "8400:8400"
    networks: [devops-poc]
    restart: unless-stopped

  # Mock Datadog MCP server. Mirrors the Datadog MCP tool surface
  # (mcp.datadoghq.com) with canned APM/metrics/monitor responses.
  # Replace by setting DATADOG_MCP_URL on mcp-proxy to the real Datadog endpoint.
  datadog-mock-mcp:
    build:
      context: ../code/mcp/datadog-mock-mcp
      <<: *ballerina-build
    image: devops-poc/datadog-mock-mcp:latest
    ports:
      - "8401:8401"
    networks: [devops-poc]
    restart: unless-stopped

  # ── WSO2-product MCP servers (Phase 6) ──────────────────────────────────────
  # Wrap each product's OWN built-in REST/management API. MODE=mock (default)
  # serves deterministic fixtures — creds-free, matches the splunk/datadog mock
  # pattern. Set MODE=live + the product's *_BASE_URL/USERNAME/PASSWORD (e.g.
  # via --profile wso2, see wso2am/wso2mi/wso2is below) to call a real instance.

  apim-mcp:
    build:
      context: ../code/mcp/apim-mcp
      <<: *ballerina-build
    image: devops-poc/apim-mcp:latest
    environment:
      MODE: ${APIM_MCP_MODE:-mock}
      APIM_BASE_URL: ${APIM_BASE_URL:-https://wso2am:9443}
      APIM_USERNAME: ${APIM_USERNAME:-admin}
      APIM_PASSWORD: ${APIM_PASSWORD:-admin}
    ports:
      - "8402:8402"
    networks: [devops-poc]
    restart: unless-stopped

  mi-mcp:
    build:
      context: ../code/mcp/mi-mcp
      <<: *ballerina-build
    image: devops-poc/mi-mcp:latest
    environment:
      MODE: ${MI_MCP_MODE:-mock}
      MI_BASE_URL: ${MI_BASE_URL:-https://wso2mi:9164}
      MI_USERNAME: ${MI_USERNAME:-admin}
      MI_PASSWORD: ${MI_PASSWORD:-admin}
    ports:
      - "8403:8403"
    networks: [devops-poc]
    restart: unless-stopped

  is-mcp:
    build:
      context: ../code/mcp/is-mcp
      <<: *ballerina-build
    image: devops-poc/is-mcp:latest
    environment:
      MODE: ${IS_MCP_MODE:-mock}
      IS_BASE_URL: ${IS_BASE_URL:-https://wso2is:9443}
      IS_USERNAME: ${IS_USERNAME:-admin}
      IS_PASSWORD: ${IS_PASSWORD:-admin}
    ports:
      - "8404:8404"
    networks: [devops-poc]
    restart: unless-stopped

  # ── Off-the-shelf infra MCP servers (Phase 6.4/6.5, --profile infra-mcp) ────
  # OFF by default — K8S_MCP_URL/DOCKER_MCP_URL are empty unless this profile
  # is active, so the proxy simply skips them (see federation.bal
  # ensureFederation). `make infra-up` runs scripts/prepare-kubeconfig.sh then
  # brings this profile up.

  k8s-mcp:
    image: ghcr.io/containers/kubernetes-mcp-server:latest
    profiles: [infra-mcp]
    # --read-only: server exposes ONLY readOnlyHint=true tools in the first
    #   place (defense in depth alongside the proxy's own k8s denylist).
    # --stateless: this stack's MCP client is a one-shot POST-per-call client
    #   (see mcp_client.bal) with no Mcp-Session-Id tracking — matches how
    #   every one of our own (stateless) mock servers already behaves. Without
    #   this flag the server runs in stateful mode and rejects a bare
    #   tools/list with "invalid during session initialization".
    command: ["--port", "8405", "--read-only", "--stateless", "--kubeconfig", "/kubeconfig/config"]
    volumes:
      - ./kubeconfig/config:/kubeconfig/config:ro
    ports:
      - "8405:8405"
    networks: [devops-poc]
    restart: unless-stopped
    # No healthcheck: distroless image, no shell/wget available. The proxy's
    # own per-backend retry back-off (federation.bal) treats it as optional
    # and self-heals once it's reachable.

  # ── Real WSO2 products (Phase 6.6, --profile wso2, optional) ────────────────
  # Live-mode target for the WSO2-product MCP servers. Mock mode (the default
  # apim-mcp/mi-mcp/is-mcp above) remains the creds-free demo/CI path; this
  # profile is the "real products" path the operator opts into.
  #
  # Images are built LOCALLY from extracted product distributions via
  # `make wso2-build-images` (see scripts/build-wso2-images.sh + compose/wso2/
  # Dockerfile). Because the Dockerfile layers the pure-Java product onto a
  # MULTI-ARCH Temurin 11 base, the images run NATIVELY on arm64 or amd64 — no
  # QEMU emulation, no dependence on WSO2's amd64-only registry images. Verified
  # on this Apple Silicon host: all three build and boot native aarch64
  # (MI ~3s, IS ~25s, APIM ~51s) with their health/management APIs responding.
  #
  # To bring the real products up in live mode, use `make wso2-up` (sets
  # {APIM,MI,IS}_MCP_MODE=live + INCLUDE_WSO2_MCP=Y and starts this profile),
  # or set those vars in compose/.env and run with `--profile wso2`.

  wso2mi:
    # MI 4.3.0 (4.2.0's extracted dir had a broken OSGi state — management API
    # would not start; 4.3.0 boots clean). Built by `make wso2-build-images`.
    image: devops-poc/wso2mi:4.3.0
    profiles: [wso2]
    mem_limit: 1g
    ports:
      # Management API only (what mi-mcp calls). MI's internal passthrough port
      # (8290) collides with mcp-proxy's host port and must never be published.
      - "9164:9164"
    networks: [devops-poc]
    restart: unless-stopped
    healthcheck:
      # /management/ returns 401 unauthenticated — a response (any code) means
      # the API is up, so run curl WITHOUT -f (which would treat 401 as failure).
      test: ["CMD-SHELL", "curl -sk -o /dev/null https://localhost:9164/management/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  wso2am:
    # APIM 4.2.0, built native-arm64 by `make wso2-build-images`.
    image: devops-poc/wso2am:4.2.0
    profiles: [wso2]
    mem_limit: 2g
    ports:
      - "9443:9443"
      - "8243:8243"
    networks: [devops-poc]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -skf https://localhost:9443/services/Version || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s

  wso2is:
    # IS 6.1.0, built native-arm64 by `make wso2-build-images`.
    image: devops-poc/wso2is:6.1.0
    profiles: [wso2]
    mem_limit: 2g
    ports:
      # wso2am above already publishes host 9443 — IS goes to host 9446.
      - "9446:9443"
    networks: [devops-poc]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -skf https://localhost:9443/api/health-check/v1.0/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ── DevOps agent (Phase 4) ────────────────────────────────────────────────

  # Ballerina LLM agent and incident responder. Triggered via POST /chat
  # (AMP protocol) or POST /investigate (structured alert). Runs a 10-step
  # triage loop, calls mcp-proxy for all MCP tools, and proposes runbooks
  # before executing them. LLM backend is configurable via LLM_PROVIDER.
  devops-oversight-agent:
    build:
      context: ../
      dockerfile: code/agent/Dockerfile
      <<: *ballerina-build
    image: devops-poc/devops-oversight-agent:latest
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: devops-oversight-agent
      # LLM backend — set LLM_PROVIDER in .env to switch (default: ollama, creds-free).
      # ollama:     OLLAMA_BASE_URL + OLLAMA_MODEL
      # anthropic:  ANTHROPIC_API_KEY + AGENT_MODEL  (AMP injects ANTHROPIC_URL automatically)
      # openai:     OPENAI_API_KEY; optionally OPENAI_BASE_URL + OPENAI_MODEL
      # amp:        AMP injects LLM_BASE_URL; optionally LLM_API_KEY + LLM_MODEL
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      # Single MCP entry point — the proxy federates the Splunk/Datadog backends
      # and its own topology namespace. The agent needs only this one URL.
      BALLERINA_TOPOLOGY_MCP_URL: ${BALLERINA_TOPOLOGY_MCP_URL:-http://mcp-proxy:8290}
      # Phase 4 §4.9 — bumped 30→40 default to absorb extra discover_tools
      # turns from Phase 6's federated backends. Do not go below 25.
      AGENT_MAX_TURNS: ${AGENT_MAX_TURNS:-40}
      # WSO2 AMP observability (optional): set AMP_TRACING_PROVIDER=amp in .env to
      # route THIS AGENT's own OTel trace (LLM spans w/ token counts, tool spans
      # w/ inputs/outputs) to AMP's Traces view instead of jaeger->otel-collector.
      # Default "jaeger" = unchanged behavior. NOTE: these are real Ballerina
      # config-override env vars (BAL_CONFIG_VAR_<ORG>_<MODULE>_<KEY>) — do not
      # default the provider var to blank; an env var present-but-empty still
      # overrides Config.toml (verified), so an empty tracingProvider would break
      # tracing outright rather than falling back to the Config.toml default.
      # host.docker.internal reaches the AMP quick-start container on the Docker
      # host, same pattern as OLLAMA_BASE_URL above.
      BAL_CONFIG_VAR_BALLERINA_OBSERVE_TRACINGPROVIDER: ${AMP_TRACING_PROVIDER:-jaeger}
      BAL_CONFIG_VAR_BALLERINAX_AMP_OTELENDPOINT: ${AMP_OTEL_ENDPOINT:-http://host.docker.internal:22893/otel}
      BAL_CONFIG_VAR_BALLERINAX_AMP_APIKEY: ${AMP_API_KEY:-}
    ports:
      - "8092:8000"  # listener on 8000. host 8082/8080 are taken by Colima's AMP-VM port-forward, so use 8092
    networks: [devops-poc]
    restart: unless-stopped
    depends_on:
      - mcp-proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
